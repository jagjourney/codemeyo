<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1b1e;
      color: #e4e5e7;
      font-size: 13px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid #2d2e32;
    }
    .header h1 { font-size: 14px; font-weight: 600; }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ef4444;
    }
    .status-dot.connected { background: #22c55e; }
    .body { padding: 16px; }
    .field { margin-bottom: 12px; }
    .field label {
      display: block;
      font-size: 11px;
      color: #9ca3af;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .field input {
      width: 100%;
      padding: 8px 10px;
      background: #2d2e32;
      border: 1px solid #3d3e42;
      border-radius: 6px;
      color: #e4e5e7;
      font-size: 13px;
      outline: none;
    }
    .field input:focus { border-color: #6366f1; }
    .row { display: flex; gap: 8px; }
    .row .field { flex: 1; }
    .row .field.small { flex: 0 0 80px; }
    button {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-connect {
      background: #6366f1;
      color: white;
    }
    .btn-connect:hover { background: #5558e6; }
    .btn-disconnect {
      background: #ef4444;
      color: white;
    }
    .btn-disconnect:hover { background: #dc2626; }
    .connected-info {
      text-align: center;
      padding: 16px 0;
    }
    .connected-info .check {
      font-size: 32px;
      margin-bottom: 8px;
    }
    .connected-info p {
      color: #9ca3af;
      font-size: 12px;
    }
    .instructions {
      margin-top: 12px;
      padding: 10px;
      background: #2d2e32;
      border-radius: 6px;
      font-size: 11px;
      color: #9ca3af;
      line-height: 1.5;
    }
    .instructions strong { color: #e4e5e7; }
    .instructions ol { padding-left: 16px; }
    .instructions li { margin-bottom: 4px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="status-dot" id="statusDot"></div>
    <h1>CodeMeYo Bridge</h1>
  </div>

  <div class="body">
    <div id="disconnectedView">
      <div class="row">
        <div class="field">
          <label>Auth Token</label>
          <input type="text" id="tokenInput" placeholder="Paste token from CodeMeYo" />
        </div>
        <div class="field small">
          <label>Port</label>
          <input type="number" id="portInput" value="9333" />
        </div>
      </div>
      <button class="btn-connect" id="connectBtn">Connect</button>

      <div class="instructions">
        <strong>Setup:</strong>
        <ol>
          <li>Open CodeMeYo</li>
          <li>Go to Browser &rarr; Extension tab</li>
          <li>Click "Start Server"</li>
          <li>Copy the token shown</li>
          <li>Paste it above and click Connect</li>
        </ol>
      </div>
    </div>

    <div id="connectedView" style="display: none;">
      <div class="connected-info">
        <div class="check">&#10003;</div>
        <p>Connected to CodeMeYo</p>
      </div>
      <button class="btn-disconnect" id="disconnectBtn">Disconnect</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
